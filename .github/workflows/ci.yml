name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    name: Lint · Test · Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm prisma generate

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build
        env:
          # Needed for Prisma client generation at build time.
          # Set a dummy value in CI; real value comes from hosting dashboard.
          DATABASE_URL: ${{ secrets.DATABASE_URL || 'postgresql://ci:ci@localhost/ci' }}

  deploy:
    name: Deploy naar Vercel
    runs-on: ubuntu-latest
    needs: ci
    # Alleen deployen bij pushes naar main, niet bij pull requests.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Deploy
        # Vereiste secrets in GitHub repository settings:
        #   VERCEL_TOKEN      — API-token van Vercel (vercel.com/account/tokens)
        #   VERCEL_ORG_ID     — te vinden in .vercel/project.json na `vercel link`
        #   VERCEL_PROJECT_ID — te vinden in .vercel/project.json na `vercel link`
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: --prod
